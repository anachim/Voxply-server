name: Release

on:
  push:
    tags:
      - "v*"

env:
  REGISTRY: ghcr.io
  HUB_IMAGE: ghcr.io/${{ github.repository_owner }}/hub
  FARM_IMAGE: ghcr.io/${{ github.repository_owner }}/farm

jobs:
  docker:
    name: Build & push Docker images
    runs-on: ubuntu-22.04
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      # ---- hub image ----

      - name: Extract hub metadata
        id: hub-meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.HUB_IMAGE }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Build and push hub
        uses: docker/build-push-action@v7
        with:
          context: .
          file: hub/Dockerfile
          push: true
          tags: ${{ steps.hub-meta.outputs.tags }}
          labels: ${{ steps.hub-meta.outputs.labels }}
          cache-from: type=gha,scope=hub
          cache-to: type=gha,mode=max,scope=hub

      # ---- farm image ----

      - name: Extract farm metadata
        id: farm-meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.FARM_IMAGE }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Build and push farm
        uses: docker/build-push-action@v7
        with:
          context: .
          file: farm/Dockerfile
          push: true
          tags: ${{ steps.farm-meta.outputs.tags }}
          labels: ${{ steps.farm-meta.outputs.labels }}
          cache-from: type=gha,scope=farm
          cache-to: type=gha,mode=max,scope=farm

  # ---- static binaries (Linux musl — no libc deps) ----

  binaries:
    name: Build static binaries
    runs-on: ubuntu-22.04
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust + musl target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl

      - uses: Swatinem/rust-cache@v2

      - name: Install musl tools
        run: sudo apt-get install -y musl-tools

      - name: Build hub (musl)
        run: cargo build --release -p voxply-hub --target x86_64-unknown-linux-musl

      - name: Build farm (musl)
        run: cargo build --release -p voxply-farm --target x86_64-unknown-linux-musl

      - name: Rename artifacts
        run: |
          cp target/x86_64-unknown-linux-musl/release/voxply-hub  voxply-hub-linux-x86_64
          cp target/x86_64-unknown-linux-musl/release/voxply-farm voxply-farm-linux-x86_64

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            voxply-hub-linux-x86_64
            voxply-farm-linux-x86_64
